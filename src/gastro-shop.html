<!DOCTYPE html>
<html lang="ru">
  @@include('./html/_head.html',{ "title":"Gastro-Shop" })
  <body>
    <div class="wrapper">
      <header class="header low-bg">
        <div class="container">
          <div class="header__inner">
            <a class="header__logo" href="index.html">
              <picture>
                <source srcset="img/global/logo.webp" type="image/webp" />
                <img src="img/global/logo.png" loading="lazy" alt="Логотип GastroChef" />
              </picture>
            </a>
            <nav class="header__menu">
              <ul class="header__menu-list">
                <li class="header__menu-item"><a class="header__menu-link" href="index.html">Программы питания</a></li>
                <li class="header__menu-item"><a class="header__menu-link" href="business-lunch.html">Бизнес ланчи</a></li>
                <li class="header__menu-item"><a class="header__menu-link" href="gastro-shop.html">Gastro Shop</a></li>
                <li class="header__menu-item"><a class="header__menu-link" href="about.html">О нас</a></li>
                <li class="header__menu-item"><a class="header__menu-link" href="blog.html">Блог</a></li>
              </ul>
            </nav>
            <a class="header__phone" href="tel:380689494919">
              +38 (068) 949 - 49 - 19
              <svg width="28" height="31" viewBox="0 0 28 31">
                <use xlink:href="img/sprite.svg#icons--phone"></use>
              </svg>
            </a>
            <ul class="header__language-list" data-da=".header__menu, 768, last">
              <li class="header__language-item"><a class="header__language-link _active" href="#">RU</a></li>
              <li class="header__language-item"><a class="header__language-link" href="#">KZ</a></li>
              <li class="header__language-item"><a class="header__language-link" href="#">EN</a></li>
            </ul>
            <div class="header__menu-burger">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </header>
      <main class="page">
        <section class="page__gshop gshop">
          <div class="container">
            <ul class="gshop__article-list">
              <li class="gshop__article-item">
                <picture>
                  <source srcset="img/gastro-shop/gastro-shop-img-01.webp" type="image/webp" />
                  <img src="img/gastro-shop/gastro-shop-img-01.jpg" loading="lazy" alt="Полезные конфеты" />
                </picture>
                <div class="gshop__article-row">
                  <h2 class="gshop__article-title">Полезные конфеты</h2>
                  <a class="gshop__article-button" href="gastro-shop_candies.html">Ассортимент</a>
                </div>
              </li>
              <li class="gshop__article-item soon">
                <picture>
                  <source srcset="img/gastro-shop/gastro-shop-img-02.webp" type="image/webp" />
                  <img src="img/gastro-shop/gastro-shop-img-02.jpg" loading="lazy" alt="Гранола" />
                </picture>
                <div class="gshop__article-row">
                  <h2 class="gshop__article-title">Гранола</h2>
                  <a class="gshop__article-button disabled" href="#">Ассортимент</a>
                </div>
              </li>
            </ul>
          </div>
        </section>
      </main>
      @@include('./html/_footer.html')
    </div>
    <script src="js/main.min.js"></script>
  </body>
</html>
